<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Athul Nath — Lead UI Engineer. Human intent. Machine speed.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a21"/>
      <stop offset="100%" stop-color="#141419"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e84848" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e84848" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e84848" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="224" fill="none" stroke="#3a3a44" stroke-width="1"/>
  <path d="M48 48 L72 48 L72 72 L48 72 Z" fill="none" stroke="#e84848" stroke-width="1.5"/>
  <path d="M1152 272 L1128 272 L1128 248 L1152 248 Z" fill="none" stroke="#e84848" stroke-width="1.5"/>

  <!-- prompt bar -->
  <rect x="80" y="72" width="1040" height="44" rx="6" fill="#1e1e26" stroke="#3a3a44" stroke-width="1"/>
  <text x="96" y="100" fill="#e84848" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">&gt;</text>
  <text x="116" y="100" fill="#b8bcc8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">find me a lead UI engineer — half craft, half machine, fully accountable</text>
  <rect x="1096" y="86" width="8" height="16" fill="#e84848" opacity="0.9"/>

  <!-- headline -->
  <text x="80" y="168" fill="#ededf0" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.02em">Human intent. Machine speed.</text>

  <!-- sub line -->
  <text x="80" y="208" fill="#9a9eaa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Lead UI Engineer · React · Next.js · agentic workflows · Kozhikode, IN</text>

  <!-- status -->
  <circle cx="96" cy="248" r="5" fill="#4ade80"/>
  <text x="112" y="252" fill="#7dd3fc" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">open to lead frontend roles · remote-friendly</text>

  <!-- pulse line -->
  <g opacity="0.85" filter="url(#softGlow)">
    <path d="M80 288 H220 l12 -6 12 6 H380 l8 4 6 -24 8 36 6 -20 6 4 H540 l12 -8 12 8 H680 V276 H720 V300 H760 V276 H800 V300 H840 V276 H880 V300 H920 V288 H1120" fill="none" stroke="#3a3a44" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M80 288 H220 l12 -6 12 6 H380 l8 4 6 -24 8 36 6 -20 6 4 H540 l12 -8 12 8 H680 V276 H720 V300 H760 V276 H800 V300 H840 V276 H880 V300 H920 V288 H1120" fill="none" stroke="#e84848" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="8 12" opacity="0.7"/>
  </g>
  <rect x="80" y="280" width="1040" height="24" fill="url(#glow)" opacity="0.25"/>
</svg>
